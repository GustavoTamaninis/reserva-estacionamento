<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/img/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Cadastro</title>
</head>
<body>
    <header>
        <nav>
            <a href="#">Cadastrar</a>
            <a href="vagas.html">Vagas Disponíveis</a>
        </nav>
    </header>
    <main>
        <section class="cadastro">
            <form action="vagas.html" method="" onsubmit="return validarForm()">
                <h2>Reserve sua Vaga</h2>
                <legend>Preencha os Dados a seguir para reservar uma vaga:</legend>
                <div class="form-group">
                    <label for="placa">Placa do veículo:</label>
                    <input type="text" id="placa" required>
                </div>
                <div class="form-group">
                    <label for="nome">Nome do Proprietário:</label>
                    <input type="text" id="nome" maxlength="30" required>
                </div>
                <div class="form-group">
                    <label for="apto_num">Número do Apartamento:</label>
                    <input type="text" id="aptoNum" required>
                </div>
                <div class="form-group">
                    <label for="apto_bloco">Bloco do apartamento:</label>
                    <input type="text" id="aptoBloco" required>
                </div>
                <div class="form-group">
                    <label for="modelo">Modelo do Veículo:</label>
                    <input type="text" id="modelo" required>
                </div>
                <div class="form-group">
                    <label for="cor">Cor do Veículo:</label>
                    <input type="text" id="cor" required>
                </div>
                <div class="form-group">
                    <label for="vaga">Número da Vaga de Estacionamento:</label>
                    <select id="vaga" required>
                        <option value="00">Selecione uma Vaga</option>
                        <option value="01">Vaga 01</option>
                        <option value="02">Vaga 02</option>
                        <option value="03">Vaga 03</option>
                        <option value="04">Vaga 04</option>
                        <option value="05">Vaga 05</option>
                        <option value="06">Vaga 06</option>
                        <option value="07">Vaga 07</option>
                        <option value="08">Vaga 08</option>
                        <option value="09">Vaga 09</option>
                        <option value="10">Vaga 10</option>
                    </select>
                    
                </div>
                <div class="button">
                    <button type="submit" id="btnSubmit">Enviar</button>
                </div>
            </form>
        </section>
    </main>
    <footer>
        Site feito por Gustavo Tamanini.
    </footer>
    <script src="assets/js/criarVagas.js"></script>
    <script src="assets/js/validarForm.js"></script>
    <script src="assets/js/inserirVaga.js"></script>
</body>
</html>
